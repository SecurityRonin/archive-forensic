name: Fuzz

# archive-core parses attacker-controllable archives (zip central directories, 7z
# headers, tar block streams, gzip/bzip2/xz wrappers). Peeling, resolving, and
# reading arbitrary bytes must NEVER panic. PR/push CI smoke-runs each target
# briefly; the scheduled run fuzzes each for longer and uploads any crash.
on:
  push:
    branches: [main]
    paths:
      - 'core/src/**'
      - 'fuzz/**'
      - '.github/workflows/fuzz.yml'
  pull_request:
    paths:
      - 'core/src/**'
      - 'fuzz/**'
      - '.github/workflows/fuzz.yml'
  schedule:
    - cron: "0 4 * * 1" # Mondays 04:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  fuzz:
    name: Fuzz ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [fuzz_peel, fuzz_resolve, fuzz_archive]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # nightly
        with:
          toolchain: nightly
          components: rust-src
      - uses: Swatinem/rust-cache@9d47c6ad4b02e050fd481d890b2ea34778fd09d6 # v2.7.8
        with:
          workspaces: fuzz -> fuzz/target
      - run: cargo install cargo-fuzz --locked
      - name: Run duration
        id: dur
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            echo "secs=600" >> "$GITHUB_OUTPUT"
          else
            echo "secs=45" >> "$GITHUB_OUTPUT"
          fi
      - name: Fuzz ${{ matrix.target }}
        working-directory: fuzz
        run: cargo +nightly fuzz run ${{ matrix.target }} -- -max_total_time=${{ steps.dur.outputs.secs }} -rss_limit_mb=4096
      - name: Upload crash artifacts
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: fuzz-crash-${{ matrix.target }}
          path: fuzz/artifacts/
          if-no-files-found: ignore
