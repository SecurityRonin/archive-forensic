# cargo-deny configuration — supply-chain and licence gate.
[graph]
all-features = false

[advisories]
version = 2
yanked = "deny"

[licenses]
version = 2
# Both crates are Apache-2.0; permit only permissive, non-copyleft licences in the
# tree. The pure-Rust codec deps (flate2/miniz_oxide, deflate64, bzip2-rs, ruzstd,
# lzma-rs, crc32fast, ...) are all MIT/Apache/BSD/Zlib/Unicode.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "Unicode-3.0",
    "ISC",
    "Zlib",
]
confidence-threshold = 0.9

[bans]
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
