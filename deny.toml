# cargo-deny configuration — supply-chain and licence gate.
[graph]
all-features = false

[advisories]
version = 2
yanked = "deny"

[licenses]
version = 2
# Both workspace crates are Apache-2.0; permit only permissive, non-copyleft
# licences. The pure-Rust codec stack (flate2/miniz_oxide, deflate64, bzip2-rs,
# ruzstd, lzma-rust2, crc32fast, ...) is MIT/Apache/BSD/Zlib/Unicode, plus:
#   - bzip2-1.0.6 : libbz2-rs-sys (pure-Rust bzip2 port) carries the permissive
#     BSD-style bzip2/libbzip2 licence — the 7z/tar.bz2 decode path needs it.
#   - MIT-0       : satisfies ppmd-rust's "CC0-1.0 OR MIT-0" (the PPMd codec in
#     the batteries-included 7z reader); MIT No Attribution is fully permissive.
allow = [
    "MIT",
    "MIT-0",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "Unicode-3.0",
    "ISC",
    "Zlib",
    "bzip2-1.0.6",
]
confidence-threshold = 0.9

[bans]
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
